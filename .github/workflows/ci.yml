name: CI

on:
  push:
    branches:
      - main
      - dev
      - 'labs/**'
      - 'fix/**'
  workflow_dispatch:
  repository_dispatch:
    types:
      - orchestrated-integration-ci

concurrency:
  group: ci-${{ github.event_name }}-${{ github.head_ref || github.event.client_payload.ref_name || github.ref_name }}
  cancel-in-progress: true

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.event.client_payload.ref_name || github.ref_name }}

      - name: set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: install dependencies
        run: npm ci

      - name: run unit tests
        run: npm test
  
  sonar:
    name: sonarqube scan
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref || github.event.client_payload.ref_name || github.ref_name }}

      - name: set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: install dependencies
        run: npm ci

      - name: run tests with coverage
        run: npm run test:coverage

      - name: sonarqube scan
        uses: sonarsource/sonarqube-scan-action@v5
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  docker:
    name: docker
    runs-on: ubuntu-latest
    needs: sonar
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.event.client_payload.ref_name || github.ref_name }}

      - name: log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: shuasd/places-frontend