name: Notify Infra Integration

on:
  push:
    branches: [labs/lab3]
  workflow_dispatch:

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: send dispatch to places-infra
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.INFRA_DISPATCH_TOKEN }}
          repository: iREALLYhateGit/places-infra
          event-type: frontend-pushed
          client-payload: '{"ref": "labs/lab3"}'
